{% extends "base.html" %}
{% load i18n %}
{% block title %}{% trans "Password set" %} · Compass{% endblock %}
{% block content %}
<div class="icon-tile" style="background:var(--green);">
  <svg width="26" height="26" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M2 7.5l3.2 3.2L12 4" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
</div>
<h1 class="auth-title" style="font-size:1.5rem;">{% trans "All done" %}</h1>
<p class="auth-sub">{% trans "Your password is saved. You can sign in now." %}</p>
<a href="{% url 'login' %}" class="btn btn-primary">{% trans "Sign in" %}</a>
{% endblock %}
